<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="kuromiGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFB6C1" /> <stop offset="50%" stop-color="#2D1B36" /> <stop offset="100%" stop-color="#FFB6C1" />
    </linearGradient>
    <style>
      .text-main { font-family: 'Segoe UI', Arial; font-size: 32px; fill: #ffffff; font-weight: 800; }
      .text-sub { font-family: 'Segoe UI', Arial; font-size: 16px; fill: #FFB6C1; letter-spacing: 2px; }
      @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
      .star { fill: #FFB6C1; animation: pulse 2s infinite; }
    </style>
  </defs>
  <rect width="800" height="200" rx="15" fill="url(#kuromiGrad)" />
  <circle class="star" cx="50" cy="50" r="3" />
  <circle class="star" cx="750" cy="150" r="4" />
  <circle class="star" cx="120" cy="160" r="2" />
  <text x="50%" y="45%" dominant-baseline="middle" text-anchor="middle" class="text-main">🎀 KUROMI'S HIDE OUT 🎀</text>
  <text x="50%" y="70%" dominant-baseline="middle" text-anchor="middle" class="text-sub">Senior Girl | Social Butterfly | Pink Addict</text>
</svg>
